<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
    }
    .header {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      padding: 16px;
      border-bottom: 1px solid rgba(34, 197, 94, 0.2);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span { color: #22c55e; }
    .header p { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .badge {
      display: inline-block;
      font-size: 9px;
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      padding: 2px 6px;
      border-radius: 9999px;
      margin-left: 4px;
    }
    .section { padding: 14px 16px; border-bottom: 1px solid #1e293b; }
    .section-title { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    label { display: block; font-size: 12px; color: #cbd5e1; margin-bottom: 4px; }
    input, select {
      width: 100%;
      padding: 8px 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #22c55e; }
    .field { margin-bottom: 10px; }
    .row { display: flex; gap: 8px; }
    .row > .field { flex: 1; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      margin-top: 6px;
    }
    .btn-secondary:hover { background: #334155; color: #e2e8f0; }
    .status {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 8px;
      display: none;
    }
    .status.success { display: block; background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    .status.error { display: block; background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .status.info { display: block; background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
    .shortcuts { font-size: 11px; color: #64748b; line-height: 1.6; }
    .shortcuts kbd { background: #1e293b; padding: 1px 5px; border-radius: 3px; border: 1px solid #334155; font-size: 10px; }
    .footer { padding: 10px 16px; text-align: center; }
    .footer a { color: #4ade80; text-decoration: none; font-size: 11px; }
    .footer a:hover { text-decoration: underline; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>&#x1f977; <span>Stealth</span>Humanizer <span class="badge">v1.0</span></h1>
    <p>Humanize AI text on any webpage</p>
  </div>

  <div class="section">
    <div class="field">
      <label for="baseUrl">Instance URL</label>
      <input type="url" id="baseUrl" placeholder="https://stealthhumanizer.vercel.app">
    </div>
    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Your provider API key">
    </div>
    <div class="row">
      <div class="field">
        <label for="model">Provider</label>
        <select id="model">
          <option value="gemini">Gemini (Free)</option>
          <option value="groq">Groq (Free)</option>
          <option value="openai">OpenAI</option>
          <option value="claude">Claude</option>
          <option value="mistral">Mistral</option>
          <option value="cohere">Cohere</option>
          <option value="together">Together</option>
          <option value="openrouter">OpenRouter</option>
          <option value="cerebras">Cerebras</option>
          <option value="deepinfra">DeepInfra</option>
        </select>
      </div>
      <div class="field">
        <label for="level">Level</label>
        <select id="level">
          <option value="medium">Medium</option>
          <option value="light">Light</option>
          <option value="aggressive">Aggressive</option>
          <option value="ninja">Ninja</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" id="save">Save Settings</button>
    <div class="status" id="saveStatus"></div>
  </div>

  <div class="section">
    <button class="btn-primary" id="humanize" disabled>Humanize Selected Text</button>
    <div class="status" id="status"></div>
    <button class="btn-secondary" id="detect">Detect Selected Text</button>
  </div>

  <div class="section">
    <div class="section-title">How to Use</div>
    <div class="shortcuts">
      1. Select text on any webpage<br>
      2. Right-click &rarr; <strong>Humanize with StealthHumanizer</strong><br>
      3. Or click <strong>Humanize Selected Text</strong> above<br>
      <br>
      The humanized text replaces the selection automatically.
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/rudra496/StealthHumanizer" target="_blank">&#x2b50; Star on GitHub</a>
    &middot;
    <a href="https://stealthhumanizer.vercel.app" target="_blank">Open Web App</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
